<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube No Ads</title>
    <link rel="icon" type="image/svg+xml" href="./javascript.svg" />
    <link rel="manifest" href="./manifest.json" />
    <script type="module" src="src/main.js" async></script>
    <style>

        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.75);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #a78bfa;
            --accent-gradient: linear-gradient(135deg, #a78bfa 0%, #818cf8 100%);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --textarea-bg: rgba(17, 24, 39, 0.9);
            font-size: 16px;
            line-height: 1.5;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f3f4f6;
                --card-bg: rgba(255, 255, 255, 0.85);
                --border-color: rgba(0, 0, 0, 0.08);
                --text-color: #1f2937;
                --text-muted: #4b5563;
                --accent-color: #6d28d9;
                --accent-gradient: linear-gradient(135deg, #6d28d9 0%, #4f46e5 100%);
                --shadow-color: rgba(0, 0, 0, 0.08);
                --textarea-bg: rgba(255, 255, 255, 0.95);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1.25rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .app-header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .app-title {
            font-size: 2.25rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .app-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 550px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            height: 9rem;
            background-color: var(--textarea-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-color);
            font-family: inherit;
            font-size: 0.95rem;
            padding: 1rem;
            resize: vertical;
            outline: none;
            box-shadow: 0 4px 6px -1px var(--shadow-color), 0 2px 4px -1px var(--shadow-color);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.25);
        }

        #video-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 0.5rem;
        }

        .video-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 10px 15px -3px var(--shadow-color), 0 4px 6px -2px var(--shadow-color);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px var(--shadow-color), 0 10px 10px -5px var(--shadow-color);
        }

        .video-link {
            color: var(--accent-color);
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
            word-break: break-all;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            align-self: flex-start;
            transition: opacity 0.2s ease;
        }

        .video-link:hover {
            text-decoration: underline;
            opacity: 0.9;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 12px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="app-title">YouTube No Ads</h1>
            <p class="app-subtitle">Paste one or more YouTube watch URLs or share links below (one per line) to load them in an ad-free player feed.</p>
        </header>

        <textarea id="txtVideoUrls" placeholder="Paste YouTube links here...&#10;e.g., https://www.youtube.com/watch?v=dQw4w9WgXcQ" spellcheck="false" autofocus></textarea>
        
        <div id="video-container"></div>
    </div>

    <script>
        const txtVideoUrls = document.getElementById('txtVideoUrls');
        txtVideoUrls.addEventListener('focus', (e) => { e.target.select(); });
        if (localStorage['txtVideoUrls']) {
            txtVideoUrls.value = localStorage['txtVideoUrls'];
            loadVideo(txtVideoUrls.value.split("\n"));
        }


        /** @param {string[]} links */
        function loadVideo(links) {
            const videoLinkPaths = [];
            for (const link of links) {
                if (!link) continue;
                if (link.startsWith('https://') === false) continue;
                try {
                    const url = new URL(link);
                    if (link.startsWith('https://www.youtube.com/watch?v=')) { // normal link
                        videoLinkPaths.push(url.searchParams.get('v'));
                    }
                    else if (link.startsWith('https://youtu.be/')) { // from share button link
                        videoLinkPaths.push(url.pathname.substring(1));
                    }
                    else {
                        console.warn('unknown url type');
                    }
                } catch (err) {
                    console.warn(err);
                }
            }
            console.log({ videoLinkPaths });

            const videoContainer = document.getElementById('video-container');
            videoContainer.innerHTML = ''; // Clear container to avoid duplicate streams on text input updates

            for (const path of videoLinkPaths) {
                const card = document.createElement('div');
                card.className = 'video-card';

                const a = document.createElement('a');
                a.className = 'video-link';
                a.setAttribute('href', `https://yout-ube.com/watch?v=${path}`);
                a.setAttribute('target', '_blank');
                a.innerHTML = `
                    <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16" style="display:inline-block;vertical-align:middle;margin-top:-2px;">
                        <path d="M4.715 6.542 3.343 7.914a3 3 0 1 0 4.243 4.243l1.828-1.829A3 3 0 0 0 8.586 5.5L8 6.086a1.002 1.002 0 0 0-.154.199 2 2 0 0 1 .861 3.337L6.88 11.45a2 2 0 1 1-2.83-2.83l.793-.792a4.018 4.018 0 0 1-.128-1.287z"/>
                        <path d="M6.586 10.172A3 3 0 0 0 10.4 10.5l.586-.586a1 1 0 0 0 .199-.154 2 2 0 0 1-3.337-.861l.792-.793a2 2 0 1 1 2.83 2.83l-1.06 1.06a2 2 0 0 1-2.83 0 1.978 1.978 0 0 0-.172-.172z"/>
                    </svg> yout-ube.com/watch?v=${path}
                `;
                card.appendChild(a);

                const iframeWrapper = document.createElement('div');
                iframeWrapper.className = 'iframe-wrapper';

                const iframe = document.createElement('iframe');
                iframe.setAttribute('referrerpolicy', 'no-referrer');
                iframe.setAttribute('allow', 'autoplay; encrypted-media; picture-in-picture');
                iframe.setAttribute('allowfullscreen', 'true');
                iframe.setAttribute('src', `https://yout-ube.com/watch?v=${path}`);
                
                iframeWrapper.appendChild(iframe);
                card.appendChild(iframeWrapper);
                videoContainer.appendChild(card);
            }
        }
        
        txtVideoUrls.addEventListener('input', function (e) {
            setTimeout(_ => {
                const links = e.target.value.trim().split("\n");
                loadVideo(links);
                setTimeout(_ => {
                    const firstIframe = document.querySelector('#video-container iframe');
                    if (firstIframe) {
                        firstIframe.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                    if (e.target.value.trim() !== '') {
                        localStorage['txtVideoUrls'] = e.target.value.trim();
                    }
                }, 0);
            }, 0);
        });
    </script>
</body>

</html>
